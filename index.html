<!DOCTYPE html>
<html>
<head>
  <title>Google Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f1f3f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 12px;
      width: 100%;
      background: #db4437;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<script>
  // 🔥 PUT YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
  apiKey: "AIzaSyAtkPjt4_umlOiQ5CcCSumD-raCgWDjUQI",
  authDomain: "the-ambar.firebaseapp.com",
  projectId: "the-ambar",
  storageBucket: "the-ambar.firebasestorage.app",
  messagingSenderId: "517488368269",
  appId: "1:517488368269:web:138cd42713e0e7958f60c4",
  measurementId: "G-BCX6J50GC6""
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
      .then((result) => {
        alert("Login Successful!");
        window.location.href = "home.html";
      })
      .catch((error) => {
        alert(error.message);
      });
  }
</script>

</body>
</html>
