<!DOCTYPE html>
<html>
<head>
  <title>The Ambar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body { margin: 0; font-family: Arial; background: #f1f3f6; }
    header {
      background: #2874f0;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }
    .card {
      background: white;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    button {
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  <h3>The Ambar</h3>
  <div>
    <button id="adminBtn" style="display:none;" onclick="goAdmin()">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="products">
  <div class="card">
    <h4>Shoes</h4>
    <p>₹999</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtkPjt4_umlOiQ5CcCSumD-raCgWDjUQI",
  authDomain: "the-ambar.firebaseapp.com",
  projectId: "the-ambar",
  storageBucket: "the-ambar.firebasestorage.app",
  messagingSenderId: "517488368269",
  appId: "1:517488368269:web:138cd42713e0e7958f60c4",
  measurementId: "G-BCX6J50GC6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const ADMIN_EMAIL = "gamerbeatsff@gmail.com";

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    if (user.email === ADMIN_EMAIL) {
      document.getElementById("adminBtn").style.display = "inline-block";
    }
  }
});

function logout() {
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}

function goAdmin() {
  window.location.href = "admin.html";
}

function addToCart() {
  alert("Added to cart 🛒");
}
</script>

</body>
</html>
