<!DOCTYPE html>
<html>
<head>
  <title>Login - The Ambar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #8360c3, #2ebf91);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #db4437;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #c23321;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Welcome to The Ambar</h2>
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<script>
  // 🔥 PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
  apiKey: "AIzaSyAtkPjt4_umlOiQ5CcCSumD-raCgWDjUQI",
  authDomain: "the-ambar.firebaseapp.com",
  projectId: "the-ambar",
  storageBucket: "the-ambar.firebasestorage.app",
  messagingSenderId: "517488368269",
  appId: "1:517488368269:web:138cd42713e0e7958f60c4",
  measurementId: "G-BCX6J50GC6"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ✅ GOOGLE LOGIN (MOBILE SAFE)
  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
  }

  // ✅ HANDLE REDIRECT RESULT
  auth.getRedirectResult()
    .then((result) => {
      if (result.user) {
        alert("Login Successful ✅");
        window.location.href = "home.html";
      }
    })
    .catch((error) => {
      alert(error.message);
    });
</script>

</body>
</html>
