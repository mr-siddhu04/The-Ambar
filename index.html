<!DOCTYPE html>
<html>
<head>
  <title>The Ambar Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Firebase v8 (IMPORTANT) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #db4437;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #c23321;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Welcome to The Ambar</h2>
  <button onclick="googleLogin()">Continue with Google</button>
</div>

<script>
  // ✅ YOUR FIREBASE CONFIG (ALREADY CORRECT)
  const firebaseConfig = {
    apiKey: "AIzaSyAtkPjt4_umlOiQ5CcCSumD-raCgWDjUQI",
    authDomain: "the-ambar.firebaseapp.com",
    projectId: "the-ambar",
    storageBucket: "the-ambar.firebasestorage.app",
    messagingSenderId: "517488368269",
    appId: "1:517488368269:web:138cd42713e0e7958f60c4"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ✅ GOOGLE LOGIN (MOBILE SAFE)
  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
  }

  // ✅ HANDLE LOGIN AFTER REDIRECT
  auth.getRedirectResult()
    .then((result) => {
      if (result.user) {
        console.log("Redirect login success");
      }
    })
    .catch((error) => {
      console.log(error.message);
    });

  // ✅ DETECT USER (MAIN FIX)
  auth.onAuthStateChanged(function(user) {
    if (user) {
      console.log("User detected:", user.displayName);
      window.location.href = "home.html"; // 🔥 redirect after login
    } else {
      console.log("No user logged in");
    }
  });
</script>

</body>
</html>
